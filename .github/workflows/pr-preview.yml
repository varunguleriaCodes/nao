name: PR Preview Deployment

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

permissions:
    contents: read
    packages: write
    pull-requests: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}/preview

jobs:
    deploy:
        name: Deploy Preview
        runs-on: ubuntu-latest
        if: github.event.action != 'closed'

        steps:
            - uses: actions/checkout@v4

            - name: Get short SHA
              id: sha
              run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Set preview name
              id: preview
              run: |
                  PREVIEW_NAME="pr-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short_sha }}"
                  PREVIEW_PORT=$((5100 + ${{ github.event.pull_request.number }}))
                  echo "name=${PREVIEW_NAME}" >> $GITHUB_OUTPUT
                  echo "port=${PREVIEW_PORT}" >> $GITHUB_OUTPUT
                  echo "url=https://${PREVIEW_NAME}.preview.getnao.io" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push preview image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.preview.outputs.name }}
                  cache-from: type=gha,scope=pr-preview
                  cache-to: type=gha,mode=max,scope=pr-preview
                  build-args: |
                      GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
                      APP_VERSION=pr-${{ github.event.pull_request.number }}
                      APP_COMMIT=${{ steps.sha.outputs.short_sha }}

            - name: Deploy to preview server
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: github-actions-demo
                  key: ${{ secrets.PRIVATE_KEY }}
                  envs: PREVIEW_NAME,PREVIEW_PORT,PREVIEW_IMAGE,GITHUB_TOKEN
                  script: |
                      export PREVIEW_NAME="${{ steps.preview.outputs.name }}"
                      export PREVIEW_PORT="${{ steps.preview.outputs.port }}"
                      export PREVIEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.preview.outputs.name }}"
                      export PR_NUMBER="${{ github.event.pull_request.number }}"

                      # Login to ghcr.io
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                      # Pull the new image
                      docker pull "$PREVIEW_IMAGE"

                      # Stop existing container if running
                      docker rm -f "nao-preview-${PR_NUMBER}" 2>/dev/null || true


                      # Run the preview container
                      docker run -d \
                          --name "nao-preview-${PR_NUMBER}" \
                          -p "${PREVIEW_PORT}:5005" \
                          -e "BETTER_AUTH_URL=https://${PREVIEW_NAME}.preview.getnao.io" \
                          -e "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" \
                          -e "NAO_CONTEXT_SOURCE=local" \
                          -e "NAO_DEFAULT_PROJECT_PATH=/app/example" \
                          -e "GITHUB_CLIENT_ID=${{ secrets.PREVIEW_GITHUB_CLIENT_ID }}" \
                          -e "GITHUB_CLIENT_SECRET=${{ secrets.PREVIEW_GITHUB_CLIENT_SECRET }}" \
                          -e "GITHUB_ALLOWED_USERS=${{ secrets.PREVIEW_GITHUB_ALLOWED_USERS }},${{ github.event.pull_request.user.login }}" \
                          -e "OPENAI_API_KEY=${{ secrets.PREVIEW_OPENAI_API_KEY }}" \
                          "$PREVIEW_IMAGE"

                      # Wait for container to be healthy
                      echo "Waiting for container to start..."
                      sleep 10

                      # Run database seed
                      echo "Seeding database..."
                      docker exec "nao-preview-${PR_NUMBER}" bun run apps/backend/scripts/db.seed.ts || true

                      # Create nginx config for this preview
                      echo "\"~^${PREVIEW_NAME}\" ${PREVIEW_PORT};" > "/home/github-actions-demo/nginx/preview.d/${PREVIEW_NAME}.conf"

                      # Reload nginx
                      docker exec nginx nginx -s reload

                      echo "Preview deployed at https://${PREVIEW_NAME}.preview.getnao.io"

            - name: Comment on PR with preview URL
              uses: actions/github-script@v7
              with:
                  script: |
                      const previewUrl = '${{ steps.preview.outputs.url }}';
                      const sha = '${{ steps.sha.outputs.short_sha }}';

                      const body = `## 🚀 Preview Deployment

                      | | |
                      |---|---|
                      | **URL** | ${previewUrl} |
                      | **Commit** | \`${sha}\` |

                      > ⚠️ No LLM API keys configured - you'll see the API key setup flow when trying to chat.

                      ---
                      <sub>Preview will be automatically removed when this PR is closed.</sub>`;

                      // Find existing comment
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const botComment = comments.find(comment =>
                          comment.user.type === 'Bot' &&
                          comment.body.includes('Preview Deployment')
                      );

                      if (botComment) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: botComment.id,
                              body: body
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body: body
                          });
                      }

    cleanup:
        name: Cleanup Preview
        runs-on: ubuntu-latest
        if: github.event.action == 'closed'

        steps:
            - name: Set preview name
              id: preview
              run: |
                  # Get the SHA from the PR head (not available directly on close)
                  PREVIEW_NAME="pr-${{ github.event.pull_request.number }}"
                  echo "name=${PREVIEW_NAME}" >> $GITHUB_OUTPUT

            - name: Remove preview deployment
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: github-actions-demo
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      PR_NUMBER="${{ github.event.pull_request.number }}"

                      echo "Cleaning up preview for PR #${PR_NUMBER}..."

                      # Stop and remove container
                      docker rm -f "nao-preview-${PR_NUMBER}" 2>/dev/null || true

                      # Remove nginx configs for this PR (handles any commit SHA)
                      rm -f /home/github-actions-demo/nginx/preview.d/pr-${PR_NUMBER}-*.conf

                      # Reload nginx
                      docker exec nginx nginx -s reload 2>/dev/null || true


                      # Clean up old images for this PR
                      docker images --format "{{.Repository}}:{{.Tag}}" | grep "preview:pr-${PR_NUMBER}" | xargs -r docker rmi 2>/dev/null || true

                      echo "Preview cleanup complete"

            - name: Comment on PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = `## 🧹 Preview Removed

                      The preview deployment for this PR has been cleaned up.`;

                      // Find existing preview comment and update it
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const botComment = comments.find(comment =>
                          comment.user.type === 'Bot' &&
                          comment.body.includes('Preview Deployment')
                      );

                      if (botComment) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: botComment.id,
                              body: body
                          });
                      }
